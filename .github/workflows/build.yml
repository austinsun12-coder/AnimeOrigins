name: Build Plugin

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn package -B
      - uses: actions/upload-artifact@v4
        with:
          name: AnimeOrigins-jar
          path: target/AnimeOrigins-1.0.0.jar
