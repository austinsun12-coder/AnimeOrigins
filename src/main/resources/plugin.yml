name: AnimeOrigins
version: 1.0.0
main: com.animeorigins.AnimeOriginsPlugin
api-version: '1.21'
description: Choose your anime origin and gain unique powers and weaknesses!
authors: [VibeCode]

commands:
  origin:
    description: Open the origin selection GUI, or use /origin info to view yours
    usage: /origin [info|character]
    aliases: [origins]
  originadmin:
    description: Admin commands for AnimeOrigins
    usage: /originadmin <set|reset> <player> [character]
    permission: animeorigins.admin

permissions:
  animeorigins.admin:
    description: Access to admin commands
    default: op
